[build]
  command = "npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "20.19.0"

[functions]
  directory = "netlify/functions"

[dev]
  command = "vite"
  targetPort = 3000
  port = 8888
  framework = "vite"

# For local development only - these won't be deployed
[dev.environment]
  # For local development with netlify dev
  # Note: You should set actual values in the Netlify UI for production
  # Replace the values below with your actual API keys for local development
  WEATHER_API_KEY = "9d46c584a17f4d67cbd4b3e0d9f8847b"

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200